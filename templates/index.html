<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Electricity Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        input:focus, select:focus {
            box-shadow: 0 0 5px #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #764ba2;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ffdd57;
            color: black;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            font-weight: 500;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>⚡ AI Smart Electricity Predictor</h2>

        <form action="/predict" method="post">
            <input type="number" name="temperature" placeholder="Temperature (°C)" required>
            <input type="number" name="people" placeholder="Number of People" required>
            <input type="number" name="ac_hours" placeholder="AC Usage (Hours)" required>
            <input type="number" name="appliances" placeholder="Number of Appliances" required>

            <select name="day_type" required>
                <option value="">Select Day Type</option>
                <option value="0">Weekday</option>
                <option value="1">Weekend</option>
            </select>

            <button type="submit">Predict Consumption</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}

        <div class="footer">
            Built with Machine Learning & Flask 🚀
        </div>
    </div>

</body>
</html>
